---
- name: Bootstrap Python on target hosts
  hosts: palette_edge_hosts
  gather_facts: false
  become: true
  tasks:
    - name: Ensure Python 3 is available for Ansible modules
      ansible.builtin.raw: >
        set -e;
        if command -v python3 >/dev/null 2>&1; then exit 0; fi;
        if command -v apt-get >/dev/null 2>&1; then
          apt-get update &&
          DEBIAN_FRONTEND=noninteractive apt-get install -y python3;
          exit 0;
        fi;
        if command -v dnf >/dev/null 2>&1; then
          dnf install -y python3; exit 0;
        fi;
        if command -v yum >/dev/null 2>&1; then
          yum install -y python3; exit 0;
        fi;
        echo "python3 is required and no supported package manager found" >&2;
        exit 1
      changed_when: false
      tags: [bootstrap]

- name: Install Spectro Cloud Palette agent host
  hosts: palette_edge_hosts
  gather_facts: true
  become: true
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/secrets.yml
  vars:
    palette_ubuntu_packages:
      - bash
      - conntrack
      - curl
      - ethtool
      - iptables
      - jq
      - rsync
      - rsyslog
      - systemd-timesyncd
      - zstd
    palette_rocky_packages:
      - bash
      - conntrack-tools
      - curl
      - ethtool
      - iptables
      - jq
      - rsync
      - rsyslog
      - zstd
    palette_rocky_fips_packages:
      - audit
      - checkpolicy
      - policycoreutils-python-utils
      - selinux-policy-devel
    palette_firewalld_ports:
      - 6443/tcp
      - 2379-2380/tcp
      - 10250/tcp
      - 10257-10259/tcp
      - 10255/tcp
      - 30000-32767/tcp
      - 8472/udp
      - 4240/tcp
      - 6081/udp
      - 51871/udp
      - 9962/tcp
      - 9963/tcp
      - 53/tcp
      - 53/udp
      - 443/tcp
  pre_tasks:
    - name: Validate management mode
      assert:
        that:
          - palette_management_mode == 'central'
        fail_msg: >-
          palette_management_mode must be 'central' (got
          '{{ palette_management_mode | default("<unset>") }}').
          This repo only supports SaaS central agent mode.
      tags: [always]

    - name: Validate registration token
      assert:
        that:
          - palette_registration_token | default('') | length > 0
          - >-
            palette_registration_token ==
            (palette_registration_token | trim)
        fail_msg: >-
          palette_registration_token is missing or has surrounding
          whitespace. Set it in group_vars/secrets.yml (no leading
          or trailing spaces).
      tags: [always]

    - name: Validate project name
      assert:
        that:
          - palette_project_name | default('') | length > 0
          - >-
            palette_project_name ==
            (palette_project_name | trim)
        fail_msg: >-
          palette_project_name is missing or has surrounding
          whitespace. Set it in group_vars/all.yml (no leading
          or trailing spaces).
      tags: [always]

    - name: Validate Palette endpoint
      assert:
        that:
          - palette_endpoint | default('') | length > 0
          - >-
            palette_endpoint ==
            (palette_endpoint | trim)
        fail_msg: >-
          palette_endpoint is missing or has surrounding
          whitespace. Set it in group_vars/all.yml
          (e.g. api.spectrocloud.com).
      tags: [always]

    - name: Validate installer checksum format when set
      assert:
        that:
          - palette_installer_checksum | regex_search(
              '^(sha1|sha224|sha256|sha384|sha512|md5):[0-9a-fA-F]+$'
            )
        fail_msg: >-
          palette_installer_checksum must look like
          '<algo>:<hex>' where algo is one of
          sha1/sha224/sha256/sha384/sha512/md5
          (got '{{ palette_installer_checksum }}').
      when: palette_installer_checksum | default('') | length > 0
      tags: [always]

    - name: Determine if target uses local connection
      set_fact:
        palette_is_local_connection: >-
          {{
            (ansible_connection | default('ssh')) == 'local'
          }}
      tags: [always]

    - name: Normalize Palette endpoint and architecture values
      set_fact:
        palette_endpoint_host: >-
          {{
            palette_endpoint
            | regex_replace('^https?://', '')
            | regex_replace('/.*$', '')
          }}
        palette_proxy_env: >-
          {{
            {}
            | combine(
                (palette_http_proxy | default('') | length > 0)
                | ternary(
                    {
                      'http_proxy': palette_http_proxy,
                      'HTTP_PROXY': palette_http_proxy,
                    },
                    {}
                  )
              )
            | combine(
                (palette_https_proxy | default('') | length > 0)
                | ternary(
                    {
                      'https_proxy': palette_https_proxy,
                      'HTTPS_PROXY': palette_https_proxy,
                    },
                    {}
                  )
              )
          }}
      tags: [always]

    - name: Refresh apt cache on Debian-based hosts
      apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_os_family == 'Debian'
      tags: [packages, prereqs]

    - name: Refresh dnf cache on RedHat-based hosts
      dnf:
        update_cache: true
      when: ansible_os_family == 'RedHat'
      tags: [packages, prereqs]

  tasks:
    - name: Install SpectroCloud prerequisites on Debian-based hosts
      apt:
        name: "{{ palette_ubuntu_packages }}"
        state: present
      when: ansible_os_family == 'Debian'
      tags: [packages, prereqs]

    - name: Install SpectroCloud prerequisites on RedHat-based hosts
      dnf:
        name: >-
          {{
            palette_rocky_packages
            + (
                (palette_use_fips
                 and ansible_distribution in ['Rocky', 'RedHat'])
                | ternary(palette_rocky_fips_packages, [])
              )
          }}
        state: present
      when: ansible_os_family == 'RedHat'
      tags: [packages, prereqs]

    - name: Ensure installation work directory exists
      file:
        path: "{{ palette_install_workdir }}"
        state: directory
        mode: '0755'
      tags: [prereqs, install]

    - name: Compute installer filename
      set_fact:
        palette_installer_script: >-
          {{
            'palette-agent-install-fips.sh'
            if palette_use_fips
            else 'palette-agent-install.sh'
          }}
      tags: [always]

    - name: Configure SELinux for Rocky Linux FIPS installs
      when:
        - palette_use_fips
        - ansible_distribution == 'Rocky'
      tags: [selinux]
      block:
        - name: Check current rsync SELinux boolean
          command: getsebool rsync_full_access
          register: palette_rsync_sebool
          changed_when: false

        - name: Enable full rsync SELinux access
          command: setsebool -P rsync_full_access 1
          when: "' --> on' not in palette_rsync_sebool.stdout"
          changed_when: true

        - name: Install rsync SELinux override policy source
          copy:
            dest: /root/rsync_dac_override.te
            mode: '0644'
            content: |
              module rsync_dac_override 1.0;

              require {
                type default_t;
                type rsync_t;
                class capability dac_override;
                class dir read;
              }

              allow rsync_t default_t:dir read;
              allow rsync_t self:capability dac_override;

        - name: Compile rsync SELinux module
          command:
            cmd: >-
              checkmodule -M -m
              --output /root/rsync_dac_override.mod
              /root/rsync_dac_override.te
            creates: /root/rsync_dac_override.mod

        - name: Package rsync SELinux module
          command:
            cmd: >-
              semodule_package --outfile /root/rsync_dac_override.pp
              -m /root/rsync_dac_override.mod
            creates: /root/rsync_dac_override.pp

        - name: Install rsync SELinux module
          shell: |
            set -o pipefail
            if semodule -l | awk '{print $1}' \
              | grep -qx rsync_dac_override; then
              echo already-installed
              exit 0
            fi
            semodule --install /root/rsync_dac_override.pp
            echo installed
          args:
            executable: /bin/bash
          register: palette_semodule_install
          changed_when: "'installed' in palette_semodule_install.stdout"

        - name: Check current cgroup version
          command: stat -fc %T /sys/fs/cgroup
          register: palette_cgroup_fs
          changed_when: false

        - name: Enable cgroup v2 in grub when required
          shell: |
            set -e
            if grep -q 'systemd.unified_cgroup_hierarchy=1' \
              /etc/default/grub; then
              echo already-set
              exit 0
            fi
            sed -i.bak \
              '/^GRUB_CMDLINE_LINUX=/ \
              s/"$/ systemd.unified_cgroup_hierarchy=1"/' \
              /etc/default/grub
            grub2-mkconfig -o /boot/grub2/grub.cfg
            echo updated
          args:
            executable: /bin/bash
          register: palette_grub_update
          changed_when: "'updated' in palette_grub_update.stdout"
          when: palette_cgroup_fs.stdout != 'cgroup2fs'

        - name: Reboot after enabling cgroup v2
          reboot:
            reboot_timeout: "{{ palette_reboot_timeout }}"
            connect_timeout: 30
            post_reboot_delay: 15
          when:
            - palette_cgroup_fs.stdout != 'cgroup2fs'
            - palette_grub_update is defined
            - palette_grub_update.changed

        - name: Re-check cgroup version after reboot
          command: stat -fc %T /sys/fs/cgroup
          register: palette_cgroup_fs_post
          changed_when: false
          when:
            - palette_cgroup_fs.stdout != 'cgroup2fs'
            - palette_grub_update is defined
            - palette_grub_update.changed

        - name: Assert cgroup v2 is active after reboot
          assert:
            that:
              - palette_cgroup_fs_post.stdout == 'cgroup2fs'
            fail_msg: >-
              cgroup v2 was requested via grub but /sys/fs/cgroup
              is still {{ palette_cgroup_fs_post.stdout }} after reboot.
              Inspect /etc/default/grub and the active kernel cmdline
              before re-running.
          when:
            - palette_cgroup_fs.stdout != 'cgroup2fs'
            - palette_grub_update is defined
            - palette_grub_update.changed

    - name: Gather service facts before optional firewalld changes
      service_facts:
      when:
        - palette_configure_cilium_firewalld
        - ansible_os_family == 'RedHat'
      tags: [firewall]

    - name: Configure firewalld for Cilium
      when:
        - palette_configure_cilium_firewalld
        - ansible_os_family == 'RedHat'
        - "'firewalld.service' in ansible_facts.services"
      tags: [firewall]
      block:
        - name: Open required firewalld ports
          command: >-
            firewall-cmd --permanent
            --zone={{ palette_cilium_firewalld_zone }}
            --add-port={{ item }}
          loop: "{{ palette_firewalld_ports }}"
          register: palette_firewalld_ports_result
          changed_when: >-
            'ALREADY_ENABLED'
            not in palette_firewalld_ports_result.stderr
          failed_when:
            - palette_firewalld_ports_result.rc != 0
            - >-
              'ALREADY_ENABLED'
              not in palette_firewalld_ports_result.stderr

        - name: Allow ESP protocol for IPsec
          command: >-
            firewall-cmd --permanent
            --zone={{ palette_cilium_firewalld_zone }}
            --add-protocol=esp
          register: palette_firewalld_esp_result
          changed_when: >-
            'ALREADY_ENABLED'
            not in palette_firewalld_esp_result.stderr
          failed_when:
            - palette_firewalld_esp_result.rc != 0
            - >-
              'ALREADY_ENABLED'
              not in palette_firewalld_esp_result.stderr

        - name: Allow NAT masquerading
          command: firewall-cmd --permanent --add-masquerade
          register: palette_firewalld_masq_result
          changed_when: >-
            'ALREADY_ENABLED'
            not in palette_firewalld_masq_result.stderr
          failed_when:
            - palette_firewalld_masq_result.rc != 0
            - >-
              'ALREADY_ENABLED'
              not in palette_firewalld_masq_result.stderr

        - name: Reload firewalld
          command: firewall-cmd --reload
          changed_when: true
          when: >-
            palette_firewalld_ports_result.changed
            or palette_firewalld_esp_result.changed
            or palette_firewalld_masq_result.changed

    - name: Render central management user-data
      template:
        src: user-data-central.yml.j2
        dest: "{{ palette_install_workdir }}/user-data"
        mode: '0600'
      tags: [install]

    - name: Check whether Palette agent is already installed
      stat:
        path: /etc/systemd/system/spectro-palette-agent-bootstrap.service
      register: palette_agent_unit
      tags: [always]

    - name: Download central management installer for Palette SaaS
      get_url:
        url: >-
          {{
            'https://github.com/spectrocloud/agent-mode/releases/latest/download/'
            ~ palette_installer_script
          }}
        dest: "{{ palette_install_workdir }}/{{ palette_installer_script }}"
        mode: '0755'
        checksum: >-
          {{
            palette_installer_checksum
            | default('', true)
            | ternary(palette_installer_checksum, omit)
          }}
      environment: "{{ palette_proxy_env }}"
      when: not palette_agent_unit.stat.exists
      tags: [install]

    - name: Run central management installer
      tags: [install]
      block:
        - name: Execute installer script
          shell: >-
            set -o pipefail;
            {{ palette_install_workdir }}/{{ palette_installer_script }}
            2>&1 | tee /var/log/palette-agent-install.log
          args:
            executable: /bin/bash
            creates: /etc/systemd/system/spectro-palette-agent-bootstrap.service
          environment: >-
            {{
              palette_proxy_env
              | combine({'USERDATA': palette_install_workdir ~ '/user-data'})
            }}
          changed_when: true
      rescue:
        - name: Capture installer log tail for diagnostics
          command: tail -n 200 /var/log/palette-agent-install.log
          register: palette_install_log_tail
          changed_when: false
          failed_when: false

        - name: Capture recent system journal for diagnostics
          command: journalctl -n 200 --no-pager
          register: palette_install_journal_tail
          changed_when: false
          failed_when: false

        - name: Show installer failure diagnostics
          debug:
            msg: |
              Palette installer failed. Diagnostic context follows.
              ----- /var/log/palette-agent-install.log (tail 200) -----
              {{ palette_install_log_tail.stdout | default('<no log>') }}
              ----- journalctl -n 200 -----
              {{ palette_install_journal_tail.stdout | default('<none>') }}

        - name: Fail after installer diagnostics
          fail:
            msg: >-
              Palette installer exited non-zero. See diagnostics above
              and /var/log/palette-agent-install.log on the target.

    - name: Reboot host after agent install
      reboot:
        reboot_timeout: "{{ palette_reboot_timeout }}"
        connect_timeout: 30
        post_reboot_delay: 20
      when:
        - palette_reboot_after_install
        - not palette_is_local_connection
        - not palette_agent_unit.stat.exists
      tags: [install, reboot]

    - name: Skip automatic reboot when running with local connection
      debug:
        msg: >-
          Skipping automatic reboot because Ansible is using
          a local connection. Reboot manually after this run
          to execute boot-time registration stages.
      when:
        - palette_reboot_after_install
        - palette_is_local_connection
        - not palette_agent_unit.stat.exists
      tags: [install, reboot]

    - name: Ensure required Palette units are enabled
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: true
      loop:
        - spectro-palette-agent-start.service
        - spectro-palette-agent-initramfs.service
        - spectro-palette-agent-boot.service
        - spectro-palette-agent-network.service
        - spectro-palette-agent-bootstrap.service
        - spectro-palette-agent-reconcile.service
        - spectro-palette-agent-reconcile.timer
      tags: [services]

    - name: Ensure reconcile timer is active
      ansible.builtin.systemd:
        name: spectro-palette-agent-reconcile.timer
        enabled: true
        state: started
      tags: [services]

    - name: Start initial Palette registration services
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: started
      loop:
        - spectro-palette-agent-network.service
        - spectro-palette-agent-bootstrap.service
        - spectro-palette-agent-reconcile.service
      tags: [services]

    # The TUI service is intentionally re-enabled by stylus when a cluster
    # is deployed onto a registered edge host (preset replays disable→enable).
    # Masking is the only state that survives `systemctl preset`. The preset
    # drop-in below is belt-and-suspenders for vendors that explicitly unmask.
    - name: Mask Palette TUI service so cluster deploy cannot re-enable it
      ansible.builtin.systemd:
        name: spectro-palette-tui.service
        masked: true
        state: stopped
      when: palette_disable_tui
      tags: [services]

    - name: Ensure systemd preset directory exists
      file:
        path: /etc/systemd/system-preset
        state: directory
        mode: '0755'
      when: palette_disable_tui
      tags: [services]

    - name: Pin Palette TUI service to disabled via systemd preset
      copy:
        dest: /etc/systemd/system-preset/00-disable-palette-tui.preset
        mode: '0644'
        content: |
          disable spectro-palette-tui.service
      when: palette_disable_tui
      tags: [services]

    - name: Unmask Palette TUI service when TUI is requested
      ansible.builtin.systemd:
        name: spectro-palette-tui.service
        masked: false
      when: not palette_disable_tui
      tags: [services]

    - name: Remove TUI-disable systemd preset when TUI is requested
      file:
        path: /etc/systemd/system-preset/00-disable-palette-tui.preset
        state: absent
      when: not palette_disable_tui
      tags: [services]

    - name: Collect Palette agent service logs
      command: >-
        journalctl
        -u spectro-palette-agent-network.service
        -u spectro-palette-agent-bootstrap.service
        -u spectro-palette-agent-reconcile.service
        -n 200
        --no-pager
      register: palette_agent_service_logs
      changed_when: false
      tags: [validation]

    - name: Validate Palette agent services produced logs
      assert:
        that:
          - "'-- No entries --' not in palette_agent_service_logs.stdout"
        fail_msg: >-
          Palette agent services did not produce logs after install.
          Check /var/log/palette-agent-install.log and systemd state.
      tags: [validation]

    - name: Summarize next validation step
      debug:
        msg: >-
          Host preparation is complete and post-install checks passed.
          Validate edge host registration and health in Palette.
      tags: [validation]
