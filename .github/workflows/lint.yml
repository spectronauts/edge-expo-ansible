name: Lint

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ansible-lint yamllint
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run ansible-lint
        run: ansible-lint

      - name: Run yamllint
        run: |
          yamllint \
            .ansible-lint \
            .github/workflows/ \
            group_vars/ \
            inventory/ \
            playbooks/ \
            tests/

      - name: Run shellcheck
        run: |
          shellcheck \
            bootstrap/install-ansible.sh \
            bootstrap/uninstall-ansible.sh

      - name: Prepare secrets file for syntax check
        run: cp group_vars/secrets.example.yml group_vars/secrets.yml

      - name: Ansible syntax check
        run: |
          ansible-playbook \
            --syntax-check \
            -i inventory/hosts.yml \
            playbooks/install_palette_agent.yml

      - name: Render user-data templates and assert structure
        run: ansible-playbook tests/render-templates.yml
