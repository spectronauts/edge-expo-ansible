name: Release

on:
  push:
    tags:
      - v*.*.*
      - '*.*.*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing tag to release (example: v1.2.3)"
        required: true
        type: string
      prerelease:
        description: Mark this as a prerelease
        required: false
        default: false
        type: boolean

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ansible-lint yamllint
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run ansible-lint
        run: ansible-lint

      - name: Run yamllint
        run: |
          yamllint \
            .ansible-lint \
            .github/workflows/ \
            group_vars/ \
            inventory/ \
            playbooks/ \
            tests/

      - name: Run shellcheck
        run: |
          shellcheck \
            bootstrap/install-ansible.sh \
            bootstrap/uninstall-ansible.sh

      - name: Prepare secrets file for syntax check
        run: cp group_vars/secrets.example.yml group_vars/secrets.yml

      - name: Ansible syntax check
        run: |
          ansible-playbook \
            --syntax-check \
            -i inventory/hosts.yml \
            playbooks/install_palette_agent.yml

      - name: Render user-data templates and assert structure
        run: ansible-playbook tests/render-templates.yml

  release:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: resolve_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag_name="${{ inputs.tag_name }}"
          else
            tag_name="${GITHUB_REF_NAME}"
          fi

          if ! git rev-parse "${tag_name}" >/dev/null 2>&1; then
            echo "Tag '${tag_name}' was not found in this repository."
            exit 1
          fi

          echo "tag_name=${tag_name}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag.outputs.tag_name }}
          generate_release_notes: true
          prerelease: ${{ inputs.prerelease || false }}
